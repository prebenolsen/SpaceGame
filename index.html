<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0a0a2e" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>Space Survivor</title>
  <style>
    :root {
      --sai-top: env(safe-area-inset-top, 0px);
      --sai-right: env(safe-area-inset-right, 0px);
      --sai-bottom: env(safe-area-inset-bottom, 0px);
      --sai-left: env(safe-area-inset-left, 0px);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
      user-select: none;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    #game-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #rotate-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #000;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      color: #fff;
      font-family: sans-serif;
      text-align: center;
      padding: 24px;
    }

    #rotate-overlay svg {
      width: 72px;
      height: 72px;
      animation: spin-phone 1.4s ease-in-out infinite alternate;
    }

    @keyframes spin-phone {
      from { transform: rotate(0deg); }
      to   { transform: rotate(-90deg); }
    }

    #rotate-overlay p {
      font-size: 1.2rem;
      letter-spacing: 0.03em;
    }

    @media (orientation: portrait) and (max-width: 1024px) {
      #rotate-overlay { display: flex; }
    }
  </style>
</head>
<body>
  <div id="rotate-overlay" aria-live="polite">
    <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="5" y="2" width="14" height="20" rx="2"/>
      <path d="M9 21h6"/>
    </svg>
    <p>Please rotate your device<br>to landscape mode</p>
  </div>
  <canvas id="game-canvas"></canvas>
  <script>
    // Polyfill for CanvasRenderingContext2D.roundRect (Safari < 15.4)
    if (!CanvasRenderingContext2D.prototype.roundRect) {
      CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
        r = Math.min(r, w / 2, h / 2);
        this.moveTo(x + r, y);
        this.arcTo(x + w, y, x + w, y + h, r);
        this.arcTo(x + w, y + h, x, y + h, r);
        this.arcTo(x, y + h, x, y, r);
        this.arcTo(x, y, x + w, y, r);
        this.closePath();
      };
    }
  </script>
  <script>
    // Try to lock orientation to landscape on mobile (Android Chrome / PWA)
    if (screen.orientation && screen.orientation.lock) {
      screen.orientation.lock('landscape').catch(() => {});
    }
  </script>
  <script type="module" src="src/main.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js');
    }
  </script>
</body>
</html>
