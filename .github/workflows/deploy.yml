name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

# Only one deployment runs at a time; cancel in-progress if a new push arrives
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Supabase credentials
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          # Strip any stray CR/LF/whitespace from the secrets — a trailing
          # newline pasted into a secret would otherwise land inside the JS
          # string literal, producing a syntax error that blanks the whole app.
          URL=$(printf '%s' "$SUPABASE_URL" | tr -d '[:space:]')
          KEY=$(printf '%s' "$SUPABASE_ANON_KEY" | tr -d '[:space:]')
          printf 'export const SUPABASE_URL = "%s";\nexport const SUPABASE_ANON_KEY = "%s";\n' \
            "$URL" "$KEY" > src/config.js

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Deploy the entire repo root — no build step needed
          path: .

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
